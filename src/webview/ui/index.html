<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'unsafe-inline';">
    <title>配置中心</title>
    <link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
    <div class="container">
        <h1>配置中心</h1>

        <section class="config-section">
            <h2>
                <svg class="icon" viewBox="0 0 16 16"><path d="M9.1 4.4L8.6 2H7.4l-.5 2.4-.7.3-2-1.3-.9.8 1.3 2-.2.7-2.4.5v1.2l2.4.5.3.8-1.3 2 .8.8 2-1.3.8.3.4 2.3h1.2l.5-2.4.8-.3 2 1.3.8-.8-1.3-2 .3-.8 2.3-.4V7.4l-2.4-.5-.3-.8 1.3-2-.8-.8-2 1.3-.7-.2zM8 11c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3z" fill-rule="evenodd"/></svg>
                基础连接
            </h2>

            <div class="form-group">
                <label for="baseUrl">Base URL</label>
                <input type="text" id="baseUrl" placeholder="例如: https://api.example.com/v1" />
            </div>

            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." />
            </div>

            <div class="form-group" style="display: flex; gap: 10px; align-items: center;">
                <button id="saveApiKey" class="btn">
                    <svg class="icon" viewBox="0 0 16 16"><path d="M11 2H9v3h2V2zm2 0h-1v3h1V2zm0 11H3V6h10v7zM3 5V4h1v1H3zm10 0V4h-1v1h1zm-5-3H5v3h3V2z" fill-rule="evenodd"/></svg>
                    保存
                </button>
                <button id="testConnection" class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 16 16"><path d="M10.44 9.56a3.53 3.53 0 00-1.06-1.92l.66-.64a1.5 1.5 0 012.12 0L14.4 9.24l-3.96 3.96-1.42-1.42 1.42-2.22zM2 9.5a3.5 3.5 0 014.95-3.05l.65-.64a4.46 4.46 0 00-6.02.42l-.65.65 1.42 1.41.65.65V9.5zM8 8a2 2 0 110 4 2 2 0 010-4z"/></svg>
                    测试连接
                </button>
                <span id="connectionStatus" class="status-message"></span>
            </div>
        </section>

        <section class="config-section">
            <h2>
                <svg class="icon" viewBox="0 0 16 16"><path d="M5 4h6v2H5zM5 7h6v2H5zM5 10h6v2H5z" fill-rule="evenodd"/><path d="M2 2v12h12V2H2zm1 1h10v10H3V3z" fill-rule="evenodd"/></svg>
                模型列表
            </h2>
            <div class="form-group" style="display: flex; gap: 10px;">
                <button id="fetchModels" class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 16 16"><path d="M8 3l4 4H9v6H7V7H4l4-4z"/></svg>
                    云端同步
                </button>
                <button id="toggleAddModel" class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 16 16"><path d="M8 2a.5.5 0 01.5.5v5h5a.5.5 0 010 1h-5v5a.5.5 0 01-1 0v-5h-5a.5.5 0 010-1h5v-5A.5.5 0 018 2z"/></svg>
                    新建模型
                </button>
            </div>

            <div id="modelsTableContainer">
                <table id="modelsTable">
                    <thead>
                        <tr>
                            <th style="width: 30%">模型 ID</th>
                            <th style="width: 20%">提供商</th>
                            <th>Context</th>
                            <th>Max Token</th>
                            <th style="width: 100px; text-align: right;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="modelsTableBody"></tbody>
                </table>
                <div id="emptyModelsMessage" style="display: none; padding: 20px; text-align: center; color: var(--vscode-descriptionForeground);">
                    暂无模型数据
                </div>
            </div>

            <div id="modelFormContainer" class="model-form" style="display: none;">
                <h3 id="modelFormTitle">配置模型详情</h3>
                <div class="grid-form">
                    <div class="form-group full-width">
                        <label>模型 ID <span class="required">*</span></label>
                        <input type="text" id="modelId" placeholder="例如: gpt-4o" required />
                    </div>
                    <div class="form-group">
                        <label>提供商 <span class="required">*</span></label>
                        <input type="text" id="ownedBy" placeholder="system" required />
                    </div>
                    <div class="form-group">
                        <label>上下文长度</label>
                        <input type="number" id="contextLength" placeholder="128000" />
                    </div>
                    <div class="form-group">
                        <label>最大 Token</label>
                        <input type="number" id="maxTokens" placeholder="4096" />
                    </div>
                    <div class="form-group">
                        <label>Temperature</label>
                        <input type="number" id="temperature" placeholder="0.7" step="0.1" />
                    </div>
                    <div class="form-group">
                        <label>Top P</label>
                        <input type="number" id="topP" placeholder="1.0" step="0.1" />
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: right;">
                    <button id="cancelModel" class="btn btn-secondary">取消</button>
                    <button id="saveModel" class="btn" style="margin-left: 10px;">确认保存</button>
                </div>
            </div>
        </section>

        <section class="config-section" style="border: none; background: transparent; padding: 0;">
            <button id="saveAllConfig" class="btn btn-success">
                <svg class="icon" viewBox="0 0 16 16"><path d="M13.85 4.15l-9 9a.5.5 0 01-.7 0l-4-4a.5.5 0 01.7-.7L4.5 12.09l8.65-8.64a.5.5 0 01.7.7z"/></svg>
                应用并保存所有配置
            </button>
            <div style="text-align: center; margin-top: 10px;">
                <span id="saveStatus" class="status-message"></span>
            </div>
        </section>
    </div>

    <script src="{{scriptUri}}"></script>
</body>
</html>
